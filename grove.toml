name = "agentlogs"
description = "Agent transcript log parsing and monitoring"
managed = true

[binary]
name = "aglogs"
path = "./bin/aglogs"

[context]
default_rules = "dev-no-tests"

[[hooks.on_stop]]
name = "Auto-format"
command = "make fmt; CODE=$?; grove internal task-report . fmt $CODE; exit $CODE"
run_if = "changes"

[[hooks.on_stop]]
name = "Validation & Smart E2E"
command = "make check; CODE=$?; grove internal task-report . check $CODE; if [ $CODE -eq 0 ]; then grove internal test-smart --skip-tags=slow; fi"
run_if = "changes"
cancel_previous = true
timeout = 300

[[hooks.post_tool_use]]
name = "concept-reminder"
if = "Bash(git commit *)"
additional_context = """
You just committed. If these changes affected architecture, behavior, or
public interfaces, invoke the concept-maintainer skill to update or add
concept docs. Skip if this was a trivial fix or docs-only change.
"""


[[test_scopes]]
name = "metrics"
rules = ".cx/metrics.rules"
scenarios = ["aglogs-metrics-command", "aglogs-metrics-pi-arms"]

[[test_scopes]]
name = "transcript-normalization"
rules = ".cx/transcript-normalization.rules"
scenarios = ["aglogs-metrics-command", "clogs-query-command", "clogs-tail-command"]
